name: Daily memory promote

on:
  schedule:
    # Daily at 07:00 UTC (00:00 PT). Adjust if needed.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no file changes)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bin/requirements.txt

      - name: Install dependencies
        run: pip install -r bin/requirements.txt

      - name: Run promote
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python bin/promote.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit and push memory updates
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "agent-cron[bot]"
          git config user.email "agent-cron@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: daily memory promote $(date -u +%Y-%m-%d)"
            git push origin HEAD:${{ github.ref_name }}
          fi
